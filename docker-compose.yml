services:
  nginx:
    image: nginx:alpine
    container_name: nginx-devops-so-final
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  app:
    build: .
    container_name: app-devops-so-final
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: devops_user
      DB_PASSWORD: devops_password
      DB_NAME: devops_db
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: db-devops-so-final
    restart: always
    environment:
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: devops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: