services:
  app:
    build: .
    container_name: app-devops-so-final
    ports:
      - "3000:3000"
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: devops_user
      DB_PASSWORD: devops_password
      DB_NAME: devops_db
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: db-devops-so-final
    restart: always
    environment:
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: devops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data: